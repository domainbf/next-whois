name: Update RDAP gTLD Bootstrap

on:
  schedule:
    # Run on the 1st of every month at 02:00 UTC
    - cron: "0 2 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate RDAP gTLD bootstrap
        run: node scripts/update-rdap-bootstrap.js

      - name: Commit updated bootstrap (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/whois/rdap_gtld_bootstrap.ts
          if git diff --cached --quiet; then
            echo "No changes — bootstrap is already up to date."
          else
            COUNT=$(grep -c 'rdap\.' src/lib/whois/rdap_gtld_bootstrap.ts || true)
            git commit -m "chore: update RDAP gTLD bootstrap (~${COUNT} entries)"
            git push
          fi
